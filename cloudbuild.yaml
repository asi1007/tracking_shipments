# Cloud Buildの設定ファイル（オプション）
steps:
  # Dockerイメージをビルド（AMD64アーキテクチャ指定）
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--platform=linux/amd64'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tracking-shipments:latest'
      - '.'
  
  # Container Registryにプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/tracking-shipments:latest']
  
  # Cloud Run Jobsにデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - 'gcloud'
      - 'run'
      - 'jobs'
      - 'deploy'
      - 'tracking-shipments'
      - '--image=gcr.io/$PROJECT_ID/tracking-shipments:latest'
      - '--region=asia-northeast1'
      - '--max-retries=0'
      - '--task-timeout=30m'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--set-env-vars=LOG_LEVEL=INFO'

images:
  - 'gcr.io/$PROJECT_ID/tracking-shipments:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

